services:
  oopoeh-dashboard:
    build: .
    container_name: oopoeh-dashboard
    ports:
      - "8099:8000"
    environment:
      - TZ=Europe/Amsterdam
      - SEARCH_POSTCODE=2273vm
      - SCRAPE_TIME=03:00
      - RATE_LIMIT_SECONDS=1.0
      - FIRST_FILL_RATE_SECONDS=0.5
    volumes:
      - oopoeh_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status', timeout=5)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  oopoeh_data:
