# Plak deze stack in Dockge (Compose-editor) en klik Deploy.
# Docker op je Proxmox-box cloont de repo bij 'main' en bouwt de image zelf —
# geen image-registry nodig. Voorwaarde: de repo is PUBLIEK op GitHub.
#
# Eerste start doet automatisch één scrape (~13 min); dashboard op poort 8099.
# Bijwerken na een git push: in Dockge de stack opnieuw bouwen/deployen.

services:
  oopoeh-dashboard:
    build: https://github.com/S4nderr/oopoeh-dashboard.git#main
    container_name: oopoeh-dashboard
    ports:
      - "8099:8000"
    environment:
      - TZ=Europe/Amsterdam
      - SEARCH_POSTCODE=2273vm
      - SCRAPE_TIME=03:00
      - RATE_LIMIT_SECONDS=1.0
    volumes:
      - oopoeh_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status', timeout=5)"]
      interval: 60s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

volumes:
  oopoeh_data:
