# Plak deze stack in Dockge (Compose-editor) en klik Deploy.
# De image wordt kant-en-klaar gepulld van GHCR (GitHub Actions bouwt hem
# bij elke push naar main). Bijwerken = de Update-knop in Dockge.
#
# Eerste start doet automatisch één scrape (~5 min); dashboard op poort 8099.

services:
  oopoeh-dashboard:
    image: ghcr.io/s4nderr/oopoeh-dashboard:latest
    container_name: oopoeh-dashboard
    ports:
      - "8099:8000"
    environment:
      - TZ=Europe/Amsterdam
      - SEARCH_POSTCODE=2273vm
      - SCRAPE_TIME=03:00
      - RATE_LIMIT_SECONDS=1.0
      - FIRST_FILL_RATE_SECONDS=0.5
    volumes:
      - oopoeh_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status', timeout=5)"]
      interval: 60s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

volumes:
  oopoeh_data:
